name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CI: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore locked dependencies
        run: dotnet restore VAL.sln --locked-mode

      - name: Verify formatting
        run: dotnet format VAL.sln --no-restore --verify-no-changes

      - name: Build solution
        run: dotnet build VAL.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test MAIN/VAL.Tests/VAL.Tests.csproj -c Release --no-build --no-restore

      - name: Audit dependencies
        run: dotnet list MAIN/VAL.Desktop/VAL.Desktop.csproj package --vulnerable --include-transitive

      - name: Verify source manifest
        shell: pwsh
        run: |
          ./Update-Manifest.ps1
          git diff --exit-code -- MAIN/Manifest.txt

      - name: Publish desktop application
        run: dotnet publish MAIN/VAL.Desktop/VAL.Desktop.csproj -c Release -r win-x64 --self-contained true --no-restore -o artifacts/publish

      - name: Run published smoke test
        shell: pwsh
        run: |
          $report = Join-Path $env:RUNNER_TEMP "VAL.SmokeReport.txt"
          $process = Start-Process `
            -FilePath "./artifacts/publish/VAL.exe" `
            -ArgumentList @("--smoke", "--smoke-timeout-ms=30000", "--smoke-report-path=$report") `
            -Wait `
            -PassThru
          Get-Content $report
          if ($process.ExitCode -ne 0) {
            throw "Published smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: VAL-win-x64
          path: artifacts/publish
          if-no-files-found: error
          retention-days: 14
